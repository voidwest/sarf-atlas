[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sarf-atlas"
version = "0.1.0"
description = "Workflow scaffolding for Arabic morphology probing with Ember artifacts."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
sarf = "sarf.cli:entrypoint"

[tool.setuptools.packages.find]
where = ["src"]
