# Local no-inference smoke config for Ember's llama-cpp-external backend path.
# This uses a mock external extractor that writes Ember artifact skeleton files.
# It does not run llama.cpp and does not perform hidden-state extraction.
# Provenance markers below are intentional: these artifacts are not research
# outputs and must never be interpreted as model behavior.

run_id = "mock-llama-cpp-external"
model_path = "sarf-atlas/smoke/fixtures/mock-model.gguf"
architecture = "llama"
backend = "llama-cpp-external"
prompt_template = "{prompt}"
input_jsonl_path = "sarf-atlas/smoke/prompts.small.jsonl"
output_dir = "/tmp/sarf-atlas-ember-smoke/runs"
layers = []
token_position = "prompt_final"
sample_id_field = "id"
word_field = "word"
batch_size = 1
dtype = "f32"
output_format = "npy"
prompt_hashes_only = false
write_logits = false
resume = false
record_model_sha256 = false
llama_cpp_binary = "sarf-atlas/smoke/mock_llama_ember_extract.py"

[run_metadata]
workspace = "sarf-atlas"
paper = "paper1-leakage-aware-probing"
purpose = "backend plumbing smoke test"
mock_backend = true
mock = true
no_inference = true
no_generation = true
no_logits = true
no_hidden_states = true
not_research_output = true
